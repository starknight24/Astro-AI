name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npx eslint src/
      - run: npx tsc --noEmit
      - run: npm run build

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx eslint src/
      - run: npx tsc --noEmit
      - run: npm run build

  science:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: science
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: science/requirements.txt
      - run: pip install -r requirements.txt
      - run: pip install pytest
      - run: pytest -q || [ $? -eq 5 ]
